<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160">
  <!-- Background is transparent by default -->
  
  <!-- Plieger Icon -->
  <g transform="translate(20, 30)">
    <!-- Outer Square -->
    <rect x="0" y="0" width="100" height="100" fill="none" stroke="#1A1A1B" stroke-width="5"/>
    
    <!-- Vertical line -->
    <line x1="45" y1="5" x2="45" y2="70" stroke="#1A1A1B" stroke-width="4"/>
    
    <!-- Top "Flag" shapes -->
    <path d="M 45 15 L 85 15 L 70 30 L 45 30 Z" fill="none" stroke="#1A1A1B" stroke-width="4" stroke-linejoin="round"/>
    <path d="M 45 40 L 85 40 L 70 55 L 45 55 Z" fill="none" stroke="#1A1A1B" stroke-width="4" stroke-linejoin="round"/>
    
    <!-- Bottom Hexagon/Prism shape -->
    <path d="M 10 85 L 30 75 L 70 75 L 90 85 L 70 95 L 30 95 Z" fill="none" stroke="#1A1A1B" stroke-width="4" stroke-linejoin="round"/>
    <line x1="10" y1="85" x2="90" y2="85" stroke="#1A1A1B" stroke-width="4"/>
    <line x1="50" y1="75" x2="50" y2="95" stroke="#1A1A1B" stroke-width="4"/>
  </g>

  <!-- Plieger Text (using high-weight paths for precision) -->
  <g transform="translate(140, 115)" fill="#1A1A1B">
    <!-- P -->
    <path d="M 0 0 V -80 H 35 C 55 -80 65 -65 65 -55 C 65 -45 55 -30 35 -30 H 18 V 0 H 0 Z M 18 -46 H 32 C 40 -46 47 -48 47 -55 C 47 -62 40 -64 32 -64 H 18 V -46 Z"/>
    
    <!-- L -->
    <path d="M 85 0 V -80 H 103 V -16 H 145 V 0 H 85 Z"/>
    
    <!-- I -->
    <path d="M 165 0 V -80 H 183 V 0 H 165 Z"/>
    
    <!-- E -->
    <path d="M 203 0 V -80 H 265 V -65 H 221 V -48 H 255 V -33 H 221 V -16 H 265 V 0 H 203 Z"/>
    
    <!-- G -->
    <path d="M 345 -35 V 0 H 310 C 290 0 275 -15 275 -40 C 275 -65 290 -80 315 -80 H 350 V -65 H 315 C 300 -65 293 -55 293 -40 C 293 -25 300 -15 315 -15 H 327 V -35 H 345 Z"/>
    
    <!-- E -->
    <path d="M 365 0 V -80 H 427 V -65 H 383 V -48 H 417 V -33 H 383 V -16 H 427 V 0 H 365 Z"/>
    
    <!-- R -->
    <path d="M 445 0 V -80 H 480 C 500 -80 512 -65 512 -55 C 512 -45 505 -35 490 -32 L 515 0 H 495 L 472 -30 H 463 V 0 H 445 Z M 463 -45 H 478 C 485 -45 494 -47 494 -55 C 494 -63 485 -65 478 -65 H 463 V -45 Z"/>
